function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error("スクリプト読み込み失敗: " + src));
    document.head.appendChild(s);
  });
}

function setCell(ws, row, col, val) {
  if (val === null || val === undefined || val === "") return;
  if (typeof val === "number" && !isFinite(val)) return; // NaN / ±Infinity はExcelが不正XMLとして扱う
  const cell = ws.getCell(row, col);
  const num = Number(val);
  if (!isNaN(num) && val !== "" && typeof val !== "boolean") {
    cell.value = num;
    // B-6 修正: 入力文字列の小数点以下桁数を numFmt に反映
    // "13.0" → "0.0", "0.123" → "0.000", "13" → General
    if (typeof val === "string" && val.indexOf(".") >= 0) {
      const parts = val.split(".");
      const decimals = (parts[1] || "").length;
      if (decimals > 0) {
        cell.numFmt = "0." + "0".repeat(decimals);
      } else {
        cell.numFmt = "General";
      }
    } else {
      // 整数 or 数値型はテンプレ書式を General に
      const currentFmt = cell.numFmt || '';
      if (currentFmt.includes('0.') || currentFmt === '0.000' || currentFmt === '0.00') {
        cell.numFmt = 'General';
      }
    }
  } else {
    cell.value = val;
  }
}

function toExcelDate(date) {
  if (!date) return null;
  return new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0));
}

// =====================================================
// B-3 追加: シート複製ヘルパー
// 機械・電気設備テンプレを5週分シートコピーするため
// =====================================================
function duplicateWorksheet(wb, sourceName, newName) {
  const src = wb.getWorksheet(sourceName);
  if (!src) return null;
  const newWs = wb.addWorksheet(newName);

  // 列幅
  if (src.columns) {
    src.columns.forEach((col, i) => {
      if (col && col.width) {
        newWs.getColumn(i + 1).width = col.width;
      }
    });
  }

  // 行高 + セル値・スタイル
  src.eachRow({ includeEmpty: true }, (row, rowNum) => {
    const newRow = newWs.getRow(rowNum);
    if (row.height) newRow.height = row.height;
    row.eachCell({ includeEmpty: true }, (cell, colNum) => {
      const newCell = newWs.getCell(rowNum, colNum);
      // 値（数式は数式として保持）
      if (cell.formula) {
        newCell.value = { formula: cell.formula, result: cell.result };
      } else if (cell.value !== null && cell.value !== undefined) {
        newCell.value = cell.value;
      }
      // スタイルをディープコピー
      if (cell.style) {
        try {
          newCell.style = JSON.parse(JSON.stringify(cell.style));
        } catch (e) {
          // 一部のスタイル(関数を含む)はJSON化不可。可能な部分だけコピー。
          newCell.font = cell.font;
          newCell.alignment = cell.alignment;
          newCell.border = cell.border;
          newCell.fill = cell.fill;
          newCell.numFmt = cell.numFmt;
        }
      }
      if (cell.numFmt) newCell.numFmt = cell.numFmt;
    });
  });

  // 結合セル
  if (src.model && src.model.merges) {
    src.model.merges.forEach(merge => {
      try { newWs.mergeCells(merge); } catch (e) {}
    });
  }

  // ページ設定
  if (src.pageSetup) {
    Object.assign(newWs.pageSetup, src.pageSetup);
  }

  // B-5 追加: ウィンドウ枠固定 (frozen panes)
  if (src.views && src.views.length > 0) {
    try {
      newWs.views = JSON.parse(JSON.stringify(src.views));
    } catch (e) {}
  }

  // B-5 追加: 条件付き書式コピー (元シートの175件規模に対応)
  // ExcelJSの conditionalFormattings は配列。直接代入で複製可能。
  if (src.conditionalFormattings && src.conditionalFormattings.length > 0) {
    try {
      newWs.conditionalFormattings = JSON.parse(JSON.stringify(src.conditionalFormattings));
    } catch (e) {
      // 失敗時は1件ずつ追加を試みる
      try {
        src.conditionalFormattings.forEach(cf => {
          newWs.addConditionalFormatting(JSON.parse(JSON.stringify(cf)));
        });
      } catch (e2) {}
    }
  }

  // B-5 追加: データ検証（プルダウン）コピー
  if (src.dataValidations && src.dataValidations.model) {
    try {
      const dvModel = JSON.parse(JSON.stringify(src.dataValidations.model));
      Object.keys(dvModel).forEach(range => {
        try { newWs.dataValidations.add(range, dvModel[range]); } catch (e) {}
      });
    } catch (e) {}
  }

  return newWs;
}

// B-3 追加: 前月最終日の電気設備データ取得（Q列用）
// localStorage の前月分 yoshiwaData を読み、最終週の最終活性日のデータを返す
// =====================================================
function getPrevMonthLastElecData() {
  const ym = yoshiwaData.targetMonth;
  if (!ym || !/^\d{4}-\d{2}$/.test(ym)) return null;
  const [y, m] = ym.split("-").map(Number);
  // 前月のYYYY-MM算出
  const prevDate = new Date(y, m - 2, 1);  // m-2: month is 0-indexed, prev month
  const prevYm = prevDate.getFullYear() + "-" + String(prevDate.getMonth() + 1).padStart(2, "0");
  const prevKey = "yoshiwa_weekly_" + prevYm;

  let prevData = null;
  try {
    const raw = localStorage.getItem(prevKey);
    if (raw) prevData = JSON.parse(raw);
  } catch (e) { return null; }

  if (!prevData || !prevData.elec) return null;

  // 前月の最終週から逆引き
  for (let w = 5; w >= 1; w--) {
    const wd = prevData.elec[w];
    if (!wd || !wd.days) continue;
    // 最終活性日を探す
    const reverseDays = [...EQUIP_DAYS].reverse();
    for (const dk of reverseDays) {
      const day = wd.days[dk];
      if (!day) continue;
      // いずれかのフィールドに値があれば最終日とみなす
      const hasValue = Object.values(day).some(v => v !== null && v !== undefined && v !== "");
      if (hasValue) return day;
    }
  }
  return null;
}

// B-3 追加: 機械設備シートの埋め込み
// 元の「日常機械設備」シートを 第1〜第5週 にコピー、各週のデータを書き込み
// =====================================================
// B-6 追加: 令和形式の年月文字列に変換 ("2026-04" → "令和8年4月")
function formatEraMonth(targetMonth) {
  if (!targetMonth || !/^\d{4}-\d{2}$/.test(targetMonth)) return "";
  const [y, m] = targetMonth.split("-").map(Number);
  // 令和: 2019-05-01 から (西暦 - 2018 = 令和年)
  const reiwa = y - 2018;
  if (reiwa >= 1) return `令和${reiwa}年${m}月`;
  return `${y}年${m}月`;
}

// B-6 追加: 指定週の日付範囲を文字列で ("4/6-4/10" 形式)
function getWeekDateRangeStr(weekIdx) {
  const ws = monthWeeks[weekIdx - 1];
  if (!ws) return "";
  const dates = [1,2,3,4,5].map(d => ws[d]).filter(d => d);
  if (dates.length === 0) return "";
  const first = dates[0];
  const last = dates[dates.length - 1];
  if (first.getTime() === last.getTime()) {
    return `${first.getMonth()+1}/${first.getDate()}`;
  }
  return `${first.getMonth()+1}/${first.getDate()}-${last.getMonth()+1}/${last.getDate()}`;
}

// B-6 追加: 1ブロックの行数を計算（結合セル領域の最終行を考慮）
// テンプレ A173:I186 のような大きな結合領域がブロック境界を跨ぐと
// 縦結合時に結合内の最後の値が全体に反映されてしまうため、結合終端を含めた行数を返す
function getBlockRowCount(ws) {
  let maxRow = ws.actualRowCount;
  if (ws.model && ws.model.merges) {
    ws.model.merges.forEach(merge => {
      const m = merge.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/);
      if (m) {
        const r2 = parseInt(m[4]);
        if (r2 > maxRow) maxRow = r2;
      }
    });
  }
  return maxRow + 2;  // 余裕2行
}

function fillMechSheet(wb) {
  const SOURCE_NAME = "日常機械設備";
  const src = wb.getWorksheet(SOURCE_NAME);
  if (!src) return;

  // データのある週のみ処理（空の週はブロック追加しない）
  const activeWeeks = [];
  for (let w = 1; w <= 5; w++) {
    const wd = yoshiwaData.mech[w];
    if (!wd || !wd.days) continue;
    const ws = monthWeeks[w - 1];
    if (!ws) continue;
    // 月内の有効日があるか判定
    const hasMonthDays = [1,2,3,4,5].some(d => ws[d]);
    if (!hasMonthDays) continue;
    // B-6 修正: 実値がある週のみブロック追加
    if (!hasAnyEquipDayData(wd)) continue;
    activeWeeks.push(w);
  }

  if (activeWeeks.length === 0) {
    // データなし: 元シートはそのまま残す
    return;
  }

  // B-6 修正: 週ごとに別シートではなく、1シート内に縦に積む方式
  // 結合セル領域(例: A173:I186)を跨がないよう、結合最終行+2 をブロック単位とする
  const ROWS_PER_BLOCK = getBlockRowCount(src);

  // 第1週は元テンプレ位置 (1〜ROWS_PER_BLOCK 行目) に書き込み
  fillMechWeekBlock(src, activeWeeks[0], 0);

  // 第2週以降は、1ブロック分の行を末尾にコピーしてから書き込み
  for (let i = 1; i < activeWeeks.length; i++) {
    const w = activeWeeks[i];
    const offset = ROWS_PER_BLOCK * i;
    copyBlockRows(src, 1, ROWS_PER_BLOCK, offset);
    fillMechWeekBlock(src, w, offset);
  }
}

// B-6 追加: 同一シート内で行範囲を別の位置にコピー
// srcStartRow〜srcEndRow を destStartRow=srcStartRow+offset の位置にコピー
function copyBlockRows(ws, srcStartRow, srcEndRow, offset) {
  if (offset <= 0) return;
  // セル値・スタイル・数式
  for (let r = srcStartRow; r <= srcEndRow; r++) {
    const srcRow = ws.getRow(r);
    const destRow = ws.getRow(r + offset);
    if (srcRow.height) destRow.height = srcRow.height;
    srcRow.eachCell({ includeEmpty: true }, (cell, colNum) => {
      const newCell = destRow.getCell(colNum);
      if (cell.formula) {
        // 数式の行参照を offset 分シフト
        const newFormula = shiftFormulaRows(cell.formula, offset, srcStartRow, srcEndRow);
        newCell.value = { formula: newFormula };
      } else if (cell.value !== null && cell.value !== undefined) {
        newCell.value = cell.value;
      }
      if (cell.style) {
        try { newCell.style = JSON.parse(JSON.stringify(cell.style)); } catch (e) {
          newCell.font = cell.font; newCell.alignment = cell.alignment;
          newCell.border = cell.border; newCell.fill = cell.fill;
          newCell.numFmt = cell.numFmt;
        }
      }
      if (cell.numFmt) newCell.numFmt = cell.numFmt;
    });
  }

  // 結合セルもオフセットして追加
  if (ws.model && ws.model.merges) {
    const newMerges = [];
    ws.model.merges.forEach(merge => {
      const m = merge.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/);
      if (m) {
        const r1 = parseInt(m[2]);
        const r2 = parseInt(m[4]);
        if (r1 >= srcStartRow && r2 <= srcEndRow) {
          newMerges.push(`${m[1]}${r1+offset}:${m[3]}${r2+offset}`);
        }
      }
    });
    newMerges.forEach(m => {
      try { ws.mergeCells(m); } catch (e) {}
    });
  }
}

// 数式の行参照をシフト (簡易版: A1〜ZZ999 形式の参照を offset 分加算)
function shiftFormulaRows(formula, offset, srcStartRow, srcEndRow) {
  return formula.replace(/(\$?[A-Z]+\$?)(\d+)/g, function(match, col, row) {
    const r = parseInt(row);
    if (r >= srcStartRow && r <= srcEndRow) {
      return col + (r + offset);
    }
    return match;  // 範囲外の参照はそのまま
  });
}

// 1週分のデータを機械設備シートの指定行オフセットに書き込む (B-6 修正)
// データのある活性日のみ左詰めで書き込み（曜日固定の列割り当てをやめる）
function fillMechWeekBlock(ws, weekIdx, rowOffset) {
  const week = yoshiwaData.mech[weekIdx];
  if (!week || !week.days) return;

  const DAY_LABELS = { mon: "月", tue: "火", wed: "水", thu: "木", fri: "金" };
  const COL_START = 5;  // E列
  const COL_END = 9;    // I列

  // 月内かつ実値がある活性日のみ抽出（順序保持）
  const activeDays = getActiveDays(week, weekIdx);
  const inMonthActiveDays = activeDays.filter(dk => {
    if (!getDateForDayKey(weekIdx, dk)) return false;
    const day = week.days[dk] || {};
    for (const k in day) {
      const v = day[k];
      if (v !== null && v !== undefined && v !== "") return true;
    }
    return false;
  });

  // タイトル行 + ヘッダー
  // (Row 1 タイトルはテンプレ「機械設備日常点検表（１/３）」のまま、追記しない)
  // Row 2 = 点検者欄 (空のまま)、Row 3 = 点検内容欄 → ここに日付を書く
  try {
    // E〜I をクリア (Row 2: 点検者欄, Row 3: 日付+曜日)
    for (let c = COL_START; c <= COL_END; c++) {
      ws.getCell(2 + rowOffset, c).value = null;
      ws.getCell(3 + rowOffset, c).value = null;
    }

    // Row 3 (点検内容欄) に「{日}日({曜})」形式の日付ヘッダーを左詰めで書き込み
    inMonthActiveDays.forEach((dk, i) => {
      const col = COL_START + i;
      const date = getDateForDayKey(weekIdx, dk);
      if (date) {
        setCell(ws, 3 + rowOffset, col, `${date.getDate()}日(${DAY_LABELS[dk]})`);
      }
    });
  } catch (e) {}

  // データ書き込み（左詰め）
  MECH_SECTIONS.forEach(sec => {
    sec.fields.forEach(f => {
      // E〜I を全てクリア (前週コピー値消去)
      for (let c = COL_START; c <= COL_END; c++) {
        ws.getCell(f.row + rowOffset, c).value = null;
      }
      // 入力日のみ左から順に書き込み
      inMonthActiveDays.forEach((dk, i) => {
        const col = COL_START + i;
        const val = week.days[dk][f.key];
        if (val !== null && val !== undefined && val !== "") {
          setCell(ws, f.row + rowOffset, col, val);
        }
      });
    });
  });
}

// 1週分のデータを機械設備シートに書き込む (旧API、互換性維持)
function fillMechWeekSheet(ws, weekIdx) {
  fillMechWeekBlock(ws, weekIdx, 0);
}

// B-3 追加: 電気設備シートの埋め込み
// =====================================================
function fillElecSheet(wb) {
  const SOURCE_NAME = "日常電気設備";
  const src = wb.getWorksheet(SOURCE_NAME);
  if (!src) return;

  const activeWeeks = [];
  for (let w = 1; w <= 5; w++) {
    const wd = yoshiwaData.elec[w];
    if (!wd || !wd.days) continue;
    const ws = monthWeeks[w - 1];
    if (!ws) continue;
    const hasMonthDays = [1,2,3,4,5].some(d => ws[d]);
    if (!hasMonthDays) continue;
    // B-6 修正: 実値がある週のみブロック追加
    if (!hasAnyEquipDayData(wd)) continue;
    activeWeeks.push(w);
  }

  if (activeWeeks.length === 0) return;

  // B-6 修正: 1シート内に縦に積む方式（結合セル領域考慮）
  const ROWS_PER_BLOCK = getBlockRowCount(src);

  // 第1週の Q列用: 前月最終日データ
  let prevDayDataForWeek = getPrevMonthLastElecData();

  // 第1週: 元位置に書き込み (offset=0)
  fillElecWeekBlock(src, activeWeeks[0], prevDayDataForWeek, 0);
  prevDayDataForWeek = getLastActiveDayElecData(activeWeeks[0]);

  // 第2週以降: ブロックコピー + 書き込み
  for (let i = 1; i < activeWeeks.length; i++) {
    const w = activeWeeks[i];
    const offset = ROWS_PER_BLOCK * i;
    copyBlockRows(src, 1, ROWS_PER_BLOCK, offset);
    fillElecWeekBlock(src, w, prevDayDataForWeek, offset);
    prevDayDataForWeek = getLastActiveDayElecData(w);
  }
}

// 指定週の最終活性日（祝日振替後）の電気データを返す
function getLastActiveDayElecData(weekIdx) {
  const week = yoshiwaData.elec[weekIdx];
  if (!week || !week.days) return null;
  const activeDays = getActiveDays(week, weekIdx);
  if (activeDays.length === 0) return null;
  const lastDk = activeDays[activeDays.length - 1];
  return week.days[lastDk] || null;
}

// 1週分のデータを電気設備シートの指定行オフセットに書き込む (B-6 修正)
// データのある活性日のみ左詰めで書き込み（曜日固定の列割り当てをやめる）
function fillElecWeekBlock(ws, weekIdx, prevDayData, rowOffset) {
  const week = yoshiwaData.elec[weekIdx];
  if (!week || !week.days) return;

  const DAY_LABELS = { mon: "月", tue: "火", wed: "水", thu: "木", fri: "金" };
  const COL_START = 7;   // G列
  const COL_END = 11;    // K列
  const PREV_COL = 17;   // Q列

  // 月内かつ実値がある活性日のみ抽出（順序保持）
  const activeDays = getActiveDays(week, weekIdx);
  const inMonthActiveDays = activeDays.filter(dk => {
    if (!getDateForDayKey(weekIdx, dk)) return false;
    const day = week.days[dk] || {};
    for (const k in day) {
      const v = day[k];
      if (v !== null && v !== undefined && v !== "") return true;
    }
    return false;
  });

  // タイトル + 日付 + 前週末ヘッダー
  // (Row 1 タイトルはテンプレ「電気設備日常点検（１/３）」のまま、追記しない)
  try {
    // G〜K, Q をクリア
    for (let c = COL_START; c <= COL_END; c++) {
      ws.getCell(2 + rowOffset, c).value = null;
    }
    ws.getCell(2 + rowOffset, PREV_COL).value = null;

    // 左詰めで「{日}日({曜})」形式の日付ヘッダーを書き込み
    inMonthActiveDays.forEach((dk, i) => {
      const col = COL_START + i;
      const date = getDateForDayKey(weekIdx, dk);
      if (date) {
        setCell(ws, 2 + rowOffset, col, `${date.getDate()}日(${DAY_LABELS[dk]})`);
      }
    });
    // Q列 ヘッダー
    setCell(ws, 2 + rowOffset, PREV_COL, "前週末");
  } catch (e) {}

  // データ書き込み（左詰め）
  ELEC_SECTIONS.forEach(sec => {
    sec.fields.forEach(f => {
      // G〜K と Q をクリア
      for (let c = COL_START; c <= COL_END; c++) {
        ws.getCell(f.row + rowOffset, c).value = null;
      }
      ws.getCell(f.row + rowOffset, PREV_COL).value = null;

      // 左詰めで書き込み
      inMonthActiveDays.forEach((dk, i) => {
        const col = COL_START + i;
        const val = week.days[dk][f.key];
        if (val !== null && val !== undefined && val !== "") {
          setCell(ws, f.row + rowOffset, col, val);
        }
      });

      // Q列: 前週末データ
      if (prevDayData && prevDayData[f.key] !== undefined && prevDayData[f.key] !== null && prevDayData[f.key] !== "") {
        setCell(ws, f.row + rowOffset, PREV_COL, prevDayData[f.key]);
      }
    });
  });

  // B-6 追加: テンプレ数式行を「使用列数N」に応じて再構築
  // 各週のデータ列数が違っても正しく動作するように、毎週リビルド
  rebuildElecFormulas(ws, rowOffset, inMonthActiveDays.length);
}

// 電気設備 数式行の再構築（左詰め N 列分）
function rebuildElecFormulas(ws, rowOffset, N) {
  const COL_START = 7;
  const COL_END = 11;
  const colLetter = c => String.fromCharCode(64 + c);

  // 差分計算パターン: G_r=G_(dataRow)-Q_(dataRow), H_r=H_(dataRow)-G_(dataRow), ...
  const DIFF_FORMULAS = [
    { formulaRow: 9,  dataRow: 8  },
    { formulaRow: 22, dataRow: 21 },
    { formulaRow: 24, dataRow: 23 },
    { formulaRow: 26, dataRow: 25 },
    { formulaRow: 28, dataRow: 27 },
  ];
  DIFF_FORMULAS.forEach(def => {
    const r = def.formulaRow + rowOffset;
    const dr = def.dataRow + rowOffset;
    // G〜K クリア
    for (let c = COL_START; c <= COL_END; c++) {
      ws.getCell(r, c).value = null;
    }
    // N列分の数式を構築（B-6: IFERROR でラップして「-」混入時の #VALUE! を回避）
    for (let i = 0; i < N; i++) {
      const col = COL_START + i;
      const colL = colLetter(col);
      const baseFormula = (i === 0)
        ? `${colL}${dr}-Q${dr}`
        : `${colL}${dr}-${colLetter(col - 1)}${dr}`;
      ws.getCell(r, col).value = { formula: `IFERROR(${baseFormula},"")` };
    }
  });

  // 同列参照パターン: G37=G2, G71=G36, G72=G2
  const SAME_COL_FORMULAS = [
    { formulaRow: 37, refRow: 2  },
    { formulaRow: 71, refRow: 36 },
    { formulaRow: 72, refRow: 2  },
  ];
  SAME_COL_FORMULAS.forEach(def => {
    const r = def.formulaRow + rowOffset;
    const refR = def.refRow + rowOffset;
    for (let c = COL_START; c <= COL_END; c++) {
      ws.getCell(r, c).value = null;
    }
    for (let i = 0; i < N; i++) {
      const col = COL_START + i;
      const colL = colLetter(col);
      ws.getCell(r, col).value = { formula: `${colL}${refR}` };
    }
  });
}

// 旧API (互換性維持)
function fillElecWeekSheet(ws, weekIdx, prevDayData) {
  fillElecWeekBlock(ws, weekIdx, prevDayData, 0);
}

async function exportExcel() {
  const btn = document.getElementById("btnExcel");
  const origText = btn.textContent;
  btn.textContent = "生成中...";
  btn.disabled = true;

  try {
    saveCurrentFormToData();

    if (typeof ExcelJS === "undefined") {
      btn.textContent = "ライブラリ読込中...";
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js");
    }
    btn.textContent = "テンプレート処理中...";

    const templateBytes = Uint8Array.from(atob(EXCEL_TEMPLATE_B64), c => c.charCodeAt(0));
    const wb = new ExcelJS.Workbook();
    await wb.xlsx.load(templateBytes.buffer);

    const ym = yoshiwaData.targetMonth || document.getElementById("targetMonth").value;
    if (!ym) { showToast("対象年月を設定してください", "error"); return; }
    const [yyyy, mm] = ym.split("-").map(Number);

    // 水質週報へ書込
    fillWaterWeeklySheet(wb);
    // 水質管理報告、新 (月報)
    fillQualityReportSheet(wb, yyyy, mm);
    // 運転管理月報
    fillOperationReportSheet(wb, yyyy, mm);
    // B-3 追加: 機械設備（5週分シートコピー）
    try { fillMechSheet(wb); } catch (e) { console.error("fillMechSheet:", e); }
    // B-3 追加: 電気設備（5週分シートコピー）
    try { fillElecSheet(wb); } catch (e) { console.error("fillElecSheet:", e); }

    // シート順調整
    try {
      // B-3: 機械・電気は週ごとに複製されるため、動的に名前を取得
      const mechSheets = [];
      const elecSheets = [];
      if (wb._worksheets) {
        wb._worksheets.forEach(s => {
          if (!s) return;
          if (typeof s.name === "string") {
            if (s.name.startsWith("日常機械設備")) mechSheets.push(s.name);
            else if (s.name.startsWith("日常電気設備")) elecSheets.push(s.name);
          }
        });
      }
      // 第N週順にソート（数値で比較）
      const weekNumOf = (name) => {
        const m = name.match(/第(\d+)週/);
        return m ? Number(m[1]) : 99;
      };
      mechSheets.sort((a, b) => weekNumOf(a) - weekNumOf(b));
      elecSheets.sort((a, b) => weekNumOf(a) - weekNumOf(b));

      const orderedNames = [
        "鏡",
        "故障一覧表",
        "水質週報",
        "水質管理報告、新",
        "運転管理月報",
        ...mechSheets,
        ...elecSheets,
        "月例機械設備",
        "月例電気設備"
      ];
      orderedNames.forEach((n, idx) => {
        const s = wb.getWorksheet(n);
        if (s) s.orderNo = idx;
      });
      const newWorksheets = [undefined];
      const usedSheets = [];
      orderedNames.forEach(n => {
        const s = wb.getWorksheet(n);
        if (s) { newWorksheets.push(s); usedSheets.push(s); }
      });
      if (wb._worksheets) {
        wb._worksheets.forEach((s, idx2) => {
          if (s && usedSheets.indexOf(s) < 0) {
            s.orderNo = orderedNames.length + idx2;
            newWorksheets.push(s);
          }
        });
      }
      wb._worksheets = newWorksheets;
    } catch (e) { console.warn("シート順調整失敗:", e); }

    // B-6 追加: 全シートのウィンドウ枠固定とタブ色を解除
    try {
      wb.eachSheet(ws => {
        // ウィンドウ枠固定の解除
        if (ws.views && ws.views.length > 0) {
          ws.views = ws.views.map(v => {
            const newView = Object.assign({}, v);
            delete newView.state;
            delete newView.xSplit;
            delete newView.ySplit;
            delete newView.topLeftCell;
            delete newView.activeCell;
            return newView;
          });
        }
        // タブ色の解除
        if (ws.properties) ws.properties.tabColor = undefined;
      });
    } catch (e) { console.warn("views/tabColor クリア失敗:", e); }

    // B-6 追加: シート名のリネーム (出力時のみ)
    try {
      const renameMap = {
        "水質管理報告、新": "水質管理報告"
      };
      Object.keys(renameMap).forEach(oldName => {
        const ws = wb.getWorksheet(oldName);
        if (ws) ws.name = renameMap[oldName];
      });
    } catch (e) { console.warn("シート名リネーム失敗:", e); }

    // B-6 追加: 機械・電気設備シートで長い項目名がセルからはみ出さないよう shrinkToFit を有効化
    // (注) 結合セルやタイトル行 (Row 1, 各週ブロック先頭) は除外。結合セルでは shrinkToFit が機能せず
    // タイトル文字が極端に縮小されて見えなくなる問題があるため。
    try {
      const shrinkConfig = [
        { name: "日常機械設備", blockSize: 188 },
        { name: "日常電気設備", blockSize: 106 },
        { name: "月例機械設備", blockSize: 0 },  // 単一ブロック
        { name: "月例電気設備", blockSize: 0 },
      ];
      shrinkConfig.forEach(cfg => {
        const ws = wb.getWorksheet(cfg.name);
        if (!ws) return;
        ws.eachRow({ includeEmpty: false }, (row, rowNum) => {
          // 各週ブロックの先頭3行（タイトル、点検者、点検内容）はスキップ
          if (cfg.blockSize > 0) {
            const inBlockRow = ((rowNum - 1) % cfg.blockSize) + 1;
            if (inBlockRow <= 3) return;
          } else {
            if (rowNum <= 3) return;
          }
          row.eachCell({ includeEmpty: false }, cell => {
            if (cell.value === null || cell.value === undefined) return;
            // 結合セルは shrinkToFit が機能しないので除外
            if (cell.master && cell.master !== cell) return;
            // 結合の主セルでも、結合範囲があれば shrinkToFit は不要（結合幅で表示される）
            if (cell.isMerged) return;
            const align = cell.alignment || {};
            if (align.wrapText) return;
            cell.alignment = Object.assign({}, align, { shrinkToFit: true });
          });
        });
      });
    } catch (e) { console.warn("shrinkToFit 設定失敗:", e); }

    // B-6 追加: 電気設備テンプレに残った余分な K1=0 をクリア（各週ブロック分）
    try {
      const wsElec = wb.getWorksheet("日常電気設備");
      if (wsElec) {
        const ROWS_PER_BLOCK_ELEC = 106;
        for (let week = 0; week < 5; week++) {
          const r = 1 + week * ROWS_PER_BLOCK_ELEC;
          // B〜Q列 (2〜17)、A列タイトルは残す
          for (let c = 2; c <= 17; c++) {
            const cell = wsElec.getCell(r, c);
            // 数値の余分な値（0など）をクリア。タイトル等の文字列は残す
            if (cell.value !== null && cell.value !== undefined && typeof cell.value !== "string") {
              cell.value = null;
            }
          }
        }
      }
    } catch (e) { console.warn("電気設備 Row 1 クリア失敗:", e); }

    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "吉和水質管理センター_" + ym + ".xlsx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Excelファイルをダウンロードしました");

  } catch (e) {
    console.error("Excel出力エラー:", e);
    showToast("Excel出力に失敗: " + (e.message || e), "error");
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

// ===== 水質週報シート埋め込み（カレンダー連動）=====
// 列は曜日インデックス d (1=月..5=金) で決まる: col = 4 + d → E..I
// monthWeeks[w-1][d] が null の日（月外 or 祝日・年末年始）は書込まず、
// テンプレートの固定値（外観・臭気など）もクリアする。
function clearWeeklySheetDayColumn(ws, weekBase, d) {
  const col = 4 + d;
  // 上段(2)〜下段末(49)までのデータ行を全てクリア。外観(22-25)・臭気(28-31)等の固定値も含む。
  for (let rowOffset = 2; rowOffset <= 49; rowOffset++) {
    const cell = ws.getCell(weekBase + rowOffset, col);
    cell.value = null;
  }
}

// ===== 積算セクション 計算ヘルパー =====
// 差分方式: (最後の値 - 最初の値) / 実カレンダー日数
// 累積メーター値なので、週の起点と終点の差分から1日平均を算出
function calcDifferentialAverage(values, dates) {
  // values: [D,E,F,G,H,I] の値配列 (null/undefined/""=空)
  // dates:  [D,E,F,G,H,I] の Date配列 (null=月外/休業日)
  let firstIdx = -1, lastIdx = -1;
  for (let i = 0; i < values.length; i++) {
    const v = values[i];
    if (v !== null && v !== undefined && v !== "" && !isNaN(Number(v))) {
      if (firstIdx === -1) firstIdx = i;
      lastIdx = i;
    }
  }
  if (firstIdx === -1 || lastIdx === firstIdx) return null; // 入力1つ以下は計算不可

  const startVal = Number(values[firstIdx]);
  const endVal = Number(values[lastIdx]);
  const startDate = dates[firstIdx];
  const endDate = dates[lastIdx];
  if (!startDate || !endDate) return null;

  const days = Math.round((endDate - startDate) / 86400000); // 1日 = 86400000ms
  if (days <= 0) return null;

  return (endVal - startVal) / days;
}

// 平均方式: AVERAGE(D:I) - 空欄自動除外
function calcSimpleAverage(values) {
  const nums = [];
  for (const v of values) {
    if (v === null || v === undefined || v === "") continue;
    const n = Number(v);
    if (!isNaN(n)) nums.push(n);
  }
  if (nums.length === 0) return null;
  return nums.reduce((a, b) => a + b, 0) / nums.length;
}

// Week N の I列値 = Week N+1 の最初の入力値と日付を返す
// Week 5（index=4）や、翌週の月内日がない場合は null を返す
function findNextWeekCheckAnchor(weekIdx, fieldId) {
  if (weekIdx >= 4) return { value: null, date: null }; // Week 5 は翌月なのでI列なし

  const nextWeekSlots = monthWeeks[weekIdx + 1];
  const nextWeekData = yoshiwaData.weeks[weekIdx + 2]; // weeksは1始まり
  if (!nextWeekSlots || !nextWeekData) return { value: null, date: null };

  // Week N+1 の月〜金 (d=1..5) の最初の非空点検日
  for (let d = 1; d <= 5; d++) {
    const dateObj = nextWeekSlots[d];
    if (!dateObj) continue;
    const dayData = nextWeekData[d];
    if (!dayData) continue;
    const v = dayData[fieldId];
    if (v !== null && v !== undefined && v !== "") {
      return { value: v, date: dateObj };
    }
  }
  return { value: null, date: null };
}

// ===== 水質週報シート 書込 =====
function fillWaterWeeklySheet(wb) {
  const ws = wb.getWorksheet("水質週報");
  if (!ws) return;
  const upper = YOSHIWA_FIELDS.upper_section;
  const lower = YOSHIWA_FIELDS.lower_section;

  for (let w = 1; w <= 5; w++) {
    const weekBase = YOSHIWA_FIELDS.WEEK_BASES[w - 1];
    const weekSlots = monthWeeks[w - 1];
    const weekData = yoshiwaData.weeks[w];

    // ==================== 上段: 積算セクション (D-I 6列) ====================
    // 各積算フィールドごとに:
    //   1. D-H列 (月〜金): dayData を書き込み（祝日は allow_on_holiday に従う）
    //   2. I列: Week N+1 の最初の点検日の値をコピー (Week 5 は空欄)
    //   3. J列: cumulative なら差分計算値、average なら AVERAGE関数維持（アプリで数値書込）
    upper.fields.forEach(f => {
      if (f.skip_weekly || f.row_offset === undefined) return;
      const row = weekBase + f.row_offset;

      // ---- D-H列の書込 (月〜金) ----
      // 日付ラベル (row_offset=2) は従来通り toExcelDate
      if (f.id === "weekly_date") {
        // 日付ヘッダーは D=月, E=火, F=水, G=木, H=金, I=翌週月
        // B-6: 祝日でも日付ラベルは表示する（実データは入らない）
        if (weekSlots) {
          const tmStr = (yoshiwaData.targetMonth || "").split("-")[1];
          const tm = parseInt(tmStr) || 0;
          for (let d = 1; d <= 5; d++) {
            const col = 3 + d; // d=1→D(4), d=2→E(5), ..., d=5→H(8)
            const headerDate = getReportHeaderDate(weekSlots, d, tm);
            if (headerDate) {
              const cell = ws.getCell(row, col);
              cell.value = toExcelDate(headerDate);
            } else {
              ws.getCell(row, col).value = null;
            }
          }
          // I列: 翌週最初の点検日の日付
          let iDate = null;
          if (w < 5) {
            const nextSlots = monthWeeks[w];
            if (nextSlots) {
              for (let d = 1; d <= 5; d++) {
                if (nextSlots[d]) { iDate = nextSlots[d]; break; }
              }
            }
          }
          if (iDate) {
            const cell = ws.getCell(row, 9);
            cell.value = toExcelDate(iDate);
            // 書式はテンプレート側のものを尊重
          } else {
            ws.getCell(row, 9).value = null;
          }
        }
        return; // 日付ラベル処理終わり
      }

      // 天候 (row_offset=3) は D-H列のみ
      if (f.id === "weather") {
        if (weekSlots && weekData) {
          for (let d = 1; d <= 5; d++) {
            const col = 3 + d; // D-H
            const dateObj = weekSlots[d];
            const dayData = weekData[d];
            if (dateObj && dayData) {
              setCell(ws, row, col, dayData[f.id]);
            } else {
              ws.getCell(row, col).value = null;
            }
          }
          ws.getCell(row, 9).value = null; // I列は天候なし
        }
        return;
      }

      // データフィールド (cumulative/average)
      const values = [null, null, null, null, null, null]; // D,E,F,G,H,I
      const dates  = [null, null, null, null, null, null];

      // D-H (d=1..5) の値を収集
      if (weekSlots && weekData) {
        for (let d = 1; d <= 5; d++) {
          const col = 3 + d; // D=4, E=5, F=6, G=7, H=8
          const dateObj = weekSlots[d];
          const dayData = weekData[d];
          if (!dateObj) {
            // 月外・休業日: allow_on_holiday=true なら dayData があれば書く
            if (f.allow_on_holiday && dayData && dayData[f.id] !== undefined && dayData[f.id] !== null && dayData[f.id] !== "") {
              const v = dayData[f.id];
              setCell(ws, row, col, v);
              values[d - 1] = v;
              // 日付は weekSlots が null なので補完: 月第N週のd曜日を計算
              // （簡易: allow_on_holidayなら値だけ書き、日数計算は別経路）
            } else {
              ws.getCell(row, col).value = null;
            }
            continue;
          }
          // 月内・平日
          if (dayData && dayData[f.id] !== undefined && dayData[f.id] !== null && dayData[f.id] !== "") {
            const v = dayData[f.id];
            setCell(ws, row, col, v);
            values[d - 1] = v;
            dates[d - 1] = dateObj;
          } else {
            ws.getCell(row, col).value = null;
          }
        }
      }

      // I列: Week N+1 の最初の点検日の値
      if (w < 5) {
        const anchor = findNextWeekCheckAnchor(w - 1, f.id);
        if (anchor.value !== null && anchor.date !== null) {
          setCell(ws, row, 9, anchor.value);
          values[5] = anchor.value;
          dates[5] = anchor.date;
        } else {
          ws.getCell(row, 9).value = null;
        }
      } else {
        ws.getCell(row, 9).value = null; // Week 5 は翌月なので I列空
      }

      // J列 (平均/計算結果)
      if (f.cumulative) {
        // 差分方式: アプリ側で計算して数値書込
        const avg = calcDifferentialAverage(values, dates);
        if (avg !== null && isFinite(avg)) {
          const cell = ws.getCell(row, 10);
          cell.value = Math.round(avg * 100) / 100; // 小数2桁に丸め
        } else {
          ws.getCell(row, 10).value = null;
        }
      }
      // average 方式 (日放流流量): テンプレートの =IFERROR(AVERAGE(D:I),"") に任せる
      // ただしもしテンプレートに関数がない場合に備えて数値計算も書き込む
      if (f.average) {
        const avg = calcSimpleAverage(values);
        if (avg !== null && isFinite(avg)) {
          const cell = ws.getCell(row, 10);
          cell.value = Math.round(avg * 100) / 100;
        }
        // 関数がテンプレートにある場合はそれを優先したいが、上書きする形でOK
        // （両方とも同じ値になるため）
      }
    });

    // ==================== 下段: 測定セクション (E-I 5列、従来通り) ====================
    // B-6: 祝日でも measure_date (日付ヘッダー) は表示する。実データは祝日では書かない。
    {
      const tmStr = (yoshiwaData.targetMonth || "").split("-")[1];
      const tm = parseInt(tmStr) || 0;
      for (let d = 1; d <= 5; d++) {
        const dateObj = weekSlots ? weekSlots[d] : null;
        const headerDate = getReportHeaderDate(weekSlots, d, tm);
        const col = 4 + d; // d=1→5(E), d=5→9(I)

        if (!headerDate) {
          // 月外日 → 該当列をクリア
          clearWeeklySheetLowerDayColumn(ws, weekBase, d);
          continue;
        }

        // 祝日（dateObj=null だが headerDate あり）の場合、データ部はクリアしてから measure_date のみ書く
        if (!dateObj) {
          clearWeeklySheetLowerDayColumn(ws, weekBase, d);
        }

        // measure_date を書き込み（祝日でも）
        const measureDateField = lower.fields.find(ff => ff.id === "measure_date");
        if (measureDateField && measureDateField.row_offset !== undefined) {
          const mdRow = weekBase + measureDateField.row_offset;
          const cell = ws.getCell(mdRow, col);
          cell.value = toExcelDate(headerDate);
          cell.numFmt = cell.numFmt || 'm/d';
        }

        if (!dateObj) continue; // 祝日: 実データは書かない
        if (!weekData) continue;
        const dayData = weekData[d];
        if (!dayData) continue;

        lower.fields.forEach(f => {
          if (f.skip_weekly || f.row_offset === undefined) return;
          if (f.id === "measure_date") return; // 既に書き込み済み
          const row = weekBase + f.row_offset;
          setCell(ws, row, col, dayData[f.id]);
        });
      }
    }

    // ==================== 上段の月外・休業日クリア（D-I列、固定値含む） ====================
    // 注: 外観・臭気はテンプレート側で固定値が入っているため、月外日はクリア必要
    // ただし、上段フィールドは非fixed値なので、上記ループで既に null を書いている
    // → 追加処理は不要だが、もし weekSlots 自体が null (月構成上ありえない) の場合の保険
  }
}

// 下段(測定セクション)のみ1日分クリア (row_offset 16-49)
function clearWeeklySheetLowerDayColumn(ws, weekBase, d) {
  const col = 4 + d;
  for (let rowOffset = 16; rowOffset <= 49; rowOffset++) {
    const cell = ws.getCell(weekBase + rowOffset, col);
    cell.value = null;
  }
}

// B-6: 週内の特定の曜日(d=1..5, 月..金)の日付を返す。祝日・休業日でも月内なら日付を返す。
// 水質週報の日付ヘッダー用 - 月外（前月/翌月）の場合のみ null を返す。
function getReportHeaderDate(weekSlots, d, targetMonth) {
  if (!weekSlots) return null;
  if (weekSlots[d]) return weekSlots[d];
  // weekSlots[d] が null（祝日）の場合、他の有効日から逆算
  for (let i = 1; i <= 5; i++) {
    if (weekSlots[i]) {
      const candidate = new Date(weekSlots[i]);
      candidate.setDate(weekSlots[i].getDate() + (d - i));
      // その日が同じ月なら返す（前月/翌月にまたぐ場合は null）
      if (candidate.getMonth() + 1 === targetMonth) return candidate;
      return null;
    }
  }
  return null;
}

// ===== 水質管理報告、新 書込 =====
// 日次データをページ1(row 8-37)とページ2(row 49-78)に転記
// MLDOはQ/R列にのみ出力
function fillQualityReportSheet(wb, yyyy, mm) {
  const ws = wb.getWorksheet("水質管理報告、新");
  if (!ws) return;

  const monthMap = buildMonthDateMap(yyyy, mm);

  const daysInMonth = new Date(yyyy, mm, 0).getDate();
  const dayNamesJP = ["日","月","火","水","木","金","土"];

  for (let day = 1; day <= 30; day++) { // テンプレートは30日までしか持たない
    // ページ1: Row 7 + day  (day=1→row8 ... day=30→row37)
    const row1 = 7 + day;
    // ページ2: Row 48 + day (day=1→row49 ... day=30→row78)
    const row2 = 48 + day;

    if (day > daysInMonth) continue;

    const dateObj = new Date(yyyy, mm - 1, day);
    const dateKey = yyyy + "-" + String(mm).padStart(2, "0") + "-" + String(day).padStart(2, "0");

    // A列=日付(数値), B列=曜日 はテンプレート既存（日付は1-30でハードコード済）
    // 念のため B列曜日を上書き
    setCell(ws, row1, 2, dayNamesJP[dateObj.getDay()]);
    setCell(ws, row2, 2, dayNamesJP[dateObj.getDay()]);

    // 休業日(祝日・年末年始)はデータ書込せず、テンプレート固定値(外観 G-J, 臭気 M-P)も含めて全クリア
    if (isCompanyHoliday(dateObj)) {
      // ページ1: C〜R 列 (3〜18) = 水温・外観・透視度・臭気・MLDO すべて
      for (let c = 3; c <= 18; c++) ws.getCell(row1, c).value = null;
      // ページ2: C〜Q 列 (3〜17) = PH・PH終沈・SV30・残留塩素 すべて
      for (let c = 3; c <= 17; c++) ws.getCell(row2, c).value = null;
      continue;
    }

    const dayData = monthMap[dateKey];
    if (!dayData) continue;

    // ===== ページ1: 水温/透視度/MLDO =====
    // （外観 G-J、臭気 M-P はテンプレート固定値を使用するため書込みしない）
    // 水温 C-F
    setCell(ws, row1, 3, dayData.temp_inflow);   // C: 流入
    setCell(ws, row1, 4, dayData.temp_ditch1);   // D: No.1ディッチ
    setCell(ws, row1, 5, dayData.temp_ditch2);   // E: No.2ディッチ
    setCell(ws, row1, 6, dayData.temp_outflow);  // F: 放流水
    // 透視度 K-L
    setCell(ws, row1, 11, dayData.transparency_inflow);
    setCell(ws, row1, 12, dayData.transparency_outflow);
    // MLDO Q-R (週報には書かない、ここだけ)
    setCell(ws, row1, 17, dayData.mldo_no1_ditch);
    setCell(ws, row1, 18, dayData.mldo_no2_ditch);

    // ===== ページ2: PH/SV30/残留塩素 (アンモニア等はPhase2) =====
    // PH: C=流入, D=No.1ディッチ, E=No.2ディッチ, F=No.1終沈, G=No.2終沈, H=放流水
    setCell(ws, row2, 3, dayData.ph_inflow);
    setCell(ws, row2, 4, dayData.ph_ditch1);
    setCell(ws, row2, 5, dayData.ph_ditch2);
    setCell(ws, row2, 6, dayData.ph_settling_1);
    setCell(ws, row2, 7, dayData.ph_settling_2);
    setCell(ws, row2, 8, dayData.ph_outflow);
    // SV30: I=No.1ディッチ, J=No.2ディッチ
    setCell(ws, row2, 9, dayData.sv30_1);
    setCell(ws, row2, 10, dayData.sv30_2);
    // K-P (アンモニア/亜硝酸/硝酸) はPhase 2
    // 残留塩素 Q
    setCell(ws, row2, 17, dayData.chlorine_residual);
  }
}

// ===== 運転管理月報 書込 =====
function fillOperationReportSheet(wb, yyyy, mm) {
  const ws = wb.getWorksheet("運転管理月報");
  if (!ws) return;

  const monthMap = buildMonthDateMap(yyyy, mm);
  const daysInMonth = new Date(yyyy, mm, 0).getDate();
  const dayNamesJP = ["日","月","火","水","木","金","土"];

  for (let day = 1; day <= 30; day++) {
    // Row5 + day: day1→row6, day30→row35
    const row = 5 + day;
    if (day > daysInMonth) continue;
    const dateObj = new Date(yyyy, mm - 1, day);
    const dateKey = yyyy + "-" + String(mm).padStart(2, "0") + "-" + String(day).padStart(2, "0");

    // A列・B列 (日・曜日) はテンプレートにハードコード済みだが、念のため曜日上書き
    setCell(ws, row, 2, dayNamesJP[dateObj.getDay()]);

    const dayData = monthMap[dateKey];
    if (!dayData) continue;

    // C: 全日電力量, D: 力測電力量, E: 無効電力量, F: 上水使用量
    setCell(ws, row, 3, dayData.electric_total);
    setCell(ws, row, 4, dayData.electric_meter);
    setCell(ws, row, 5, dayData.electric_reactive);
    setCell(ws, row, 6, dayData.water_usage);

    // K: 返送汚泥流量1 (L=差分関数)
    setCell(ws, row, 11, dayData.return_sludge_1);
    // M: 返送汚泥流量2 (N=差分関数)
    setCell(ws, row, 13, dayData.return_sludge_2);
    // O: 余剰汚泥流量 (P=差分関数)
    setCell(ws, row, 15, dayData.excess_sludge);
  }
}

// 日付→日データをマップ化（monthWeeks ベース、月外はスキップ）
function buildMonthDateMap(yyyy, mm) {
  const map = {};
  for (let w = 1; w <= 5; w++) {
    const weekSlots = monthWeeks[w - 1];
    const weekData = yoshiwaData.weeks[w];
    if (!weekSlots || !weekData) continue;
    for (let d = 1; d <= 5; d++) {
      const dateObj = weekSlots[d];
      if (!dateObj) continue;
      if (dateObj.getFullYear() !== yyyy || (dateObj.getMonth() + 1) !== mm) continue;
      const dayData = weekData[d];
      if (dayData) map[formatDateKey(dateObj)] = dayData;
    }
  }
  return map;
}

// ===== 年報Excel出力 =====
async function exportYearExcel() {
  const btn = document.getElementById("btnYearExcel");
  const origText = btn.textContent;
  btn.textContent = "生成中...";
  btn.disabled = true;
  try {
    saveCurrentFormToData();

    // 対象年度をユーザー確認
    const defaultFy = annualFiscalYear || fiscalYearFromMonth(yoshiwaData.targetMonth || currentYearMonth());
    const fyInput = prompt("対象年度（西暦4桁、例: 2025 = 2025年4月〜2026年3月）:", defaultFy);
    if (!fyInput) { return; }
    const fy = String(fyInput).trim();
    if (!/^\d{4}$/.test(fy)) { showToast("年度は4桁の数字で入力してください", "error"); return; }

    if (typeof ExcelJS === "undefined") {
      btn.textContent = "ライブラリ読込中...";
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js");
    }
    btn.textContent = "テンプレート処理中...";

    if (typeof EXCEL_YEAR_TEMPLATE_B64 === "undefined") {
      throw new Error("年報テンプレートが読み込まれていません");
    }
    const templateBytes = Uint8Array.from(atob(EXCEL_YEAR_TEMPLATE_B64), c => c.charCodeAt(0));
    const wb = new ExcelJS.Workbook();
    await wb.xlsx.load(templateBytes.buffer);

    // 4月1日の初期値バリデーション
    if (!isAerationApril1Complete(fy)) {
      const missing = getAerationApril1Missing(fy);
      const proceed = confirm(`${fy}年4月1日の初期運転時間が未入力です。\n未入力の台: ${missing.join(", ")}\n\nこのまま出力を続行しますか？（未入力の台は前年度末からの継続値、または 0 として扱われます）`);
      if (!proceed) { return; }
    }

    // エアレーション年報（シート1）: 12ヶ月分の月次合計（前回値継続方式）
    const wsA = wb.getWorksheet("エアレーション運転時間年報") || wb.worksheets[0];
    const monthsOrder = ["04","05","06","07","08","09","10","11","12","01","02","03"];
    // メモリに全対象月をロードしておく（calculateMonthlyAerationTotal が localStorage fallback するが、
    //   メモリにも置いておくと前月からの繰越参照が高速）
    monthsOrder.forEach(mm => {
      const y = (Number(mm) >= 4) ? fy : String(Number(fy) + 1);
      const ym = y + "-" + mm;
      if (!annualData.aeration[ym]) {
        try {
          const raw = localStorage.getItem("yoshiwa_aeration_" + ym);
          if (raw) annualData.aeration[ym] = JSON.parse(raw);
        } catch(e){}
        if (!annualData.aeration[ym]) ensureAerationForMonth(ym);
      }
    });
    monthsOrder.forEach((mm, idx) => {
      const row = 6 + idx;
      const y = (Number(mm) >= 4) ? fy : String(Number(fy) + 1);
      const ym = y + "-" + mm;
      YOSHIWA_ANNUAL.aeration.fields.forEach((f, colIdx) => {
        const total = calculateMonthlyAerationTotal(ym, f.id);
        // B,C,D,E 列 = 4台
        setCell(wsA, row, 2 + colIdx, Math.round(total * 10) / 10);
      });
    });

    // 返送汚泥MLSS年報（シート2）: 12ヶ月分の月平均（アプリ側で集計）
    const wsM = wb.getWorksheet("返送汚泥MLSS年報") || wb.worksheets[1];
    monthsOrder.forEach((mm, idx) => {
      const row = 6 + idx;
      const y = (Number(mm) >= 4) ? fy : String(Number(fy) + 1);
      const ym = y + "-" + mm;
      const monthData = (function(){
        try {
          const raw = localStorage.getItem("yoshiwa_mlss_return_" + ym);
          if (raw) return JSON.parse(raw);
        } catch(e){}
        return annualData.mlssReturn[ym] || null;
      })();
      if (!monthData || !monthData.weeks) return;
      let sum1 = 0, n1 = 0, sum2 = 0, n2 = 0;
      for (let w = 1; w <= 5; w++) {
        const ww = monthData.weeks[w];
        if (!ww) continue;
        for (let d = 1; d <= 5; d++) {
          const rec = ww[d];
          if (!rec) continue;
          const v1 = rec.mlss_return_1;
          if (v1 !== null && v1 !== undefined && v1 !== "") {
            const n = Number(v1);
            if (!isNaN(n)) { sum1 += n; n1++; }
          }
          const v2 = rec.mlss_return_2;
          if (v2 !== null && v2 !== undefined && v2 !== "") {
            const n = Number(v2);
            if (!isNaN(n)) { sum2 += n; n2++; }
          }
        }
      }
      if (n1 > 0) setCell(wsM, row, 2, Math.round(sum1 / n1));
      if (n2 > 0) setCell(wsM, row, 3, Math.round(sum2 / n2));
    });

    // 年度ラベル (B3 = 令和xx年度)
    const reiwa = Number(fy) - 2018;
    if (wsA) { const c = wsA.getCell(3, 2); c.value = "令和" + reiwa + "年度"; }
    if (wsM) { const c = wsM.getCell(3, 2); c.value = "令和" + reiwa + "年度"; }

    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "吉和水質管理センター_年報_" + fy + "年度.xlsx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("年報Excelをダウンロードしました");
  } catch(e) {
    console.error("年報Excel出力エラー:", e);
    showToast("年報Excel出力に失敗: " + (e.message || e), "error");
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

// ===== イベントハンドラ =====
function bindEvents() {
  document.getElementById("targetMonth").addEventListener("change", (e) => {
    saveCurrentFormToData();
    const ym = e.target.value;
    yoshiwaData.targetMonth = ym;
    // startDate は互換のため更新するが UI では非表示
    const auto = estimateStartDate(ym);
    if (auto) {
      document.getElementById("startDate").value = auto;
      yoshiwaData.startDate = auto;
    }
    loadFromStorage(); // 週報データ読込
    loadAnnualFromStorage(); // 年報データ読込
    recomputeMonthWeeks();
    // 月が変わって currentWeek/currentDay が範囲外になったら補正
    if (currentWeek > monthWeeks.length) currentWeek = 1;
    const ws0 = monthWeeks[currentWeek - 1];
    if (ws0 && !ws0[currentDay]) {
      for (let d = 1; d <= 5; d++) if (ws0[d]) { currentDay = d; break; }
    }
    renderAll();
    markDirty();
  });

  document.querySelectorAll("#mainTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      saveCurrentFormToData();
      currentMain = btn.dataset.main;
      renderAll();
    });
  });

  // #weekTabs は renderWeekTabs() が動的生成時にクリックハンドラをバインドするため、ここでは登録しない

  document.querySelectorAll("#secTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      saveCurrentFormToData();
      currentSection = btn.dataset.sec;
      renderAll();
    });
  });

  document.querySelectorAll("#annualSubTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      saveCurrentFormToData();
      currentAnnualSub = btn.dataset.asub;
      renderAll();
    });
  });

  // ===== B-1 追加: 機械設備のイベント =====
  document.querySelectorAll("#mechWeekTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentMechWeek = Number(btn.dataset.mweek);
      renderMechPanel();
    });
  });
  document.querySelectorAll("#mechPartTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentMechPart = Number(btn.dataset.mpart);
      renderMechPanel();
    });
  });
  const mechPatternSel = document.getElementById("mechPattern");
  if (mechPatternSel) {
    mechPatternSel.addEventListener("change", () => {
      const newPattern = mechPatternSel.value;
      if (yoshiwaData.mech[currentMechWeek]) {
        yoshiwaData.mech[currentMechWeek].pattern = newPattern;
      }
      // 電気は機械の逆
      if (yoshiwaData.elec[currentMechWeek]) {
        yoshiwaData.elec[currentMechWeek].pattern = (newPattern === "mwf") ? "tt" : "mwf";
      }
      markDirty();
      renderMechPanel();
    });
  }

  // ===== B-1 追加: 電気設備のイベント =====
  document.querySelectorAll("#elecWeekTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentElecWeek = Number(btn.dataset.eweek);
      renderElecPanel();
    });
  });
  document.querySelectorAll("#elecPartTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentElecPart = Number(btn.dataset.epart);
      renderElecPanel();
    });
  });

  document.getElementById("btnSave").addEventListener("click", async () => {
    const btnSave = document.getElementById("btnSave");

    // 1. スコープ文字列を先に決定（エラー時のトースト用）
    let scope = '';
    if (currentMain === 'weekly') {
      scope = '第' + currentWeek + '週';
    } else if (currentMain === 'mech') {
      scope = '機械設備 第' + currentMechWeek + '週';
    } else if (currentMain === 'elec') {
      scope = '電気設備 第' + currentElecWeek + '週';
    } else if (currentMain === 'annual') {
      scope = currentAnnualSub === 'aeration' ? 'エアレーション' : '返送汚泥MLSS';
    }

    // 2. ローカル保存
    if (!saveToStorage()) {
      showToast("保存に失敗しました", "error");
      return;
    }

    // 3. サーバーへアップロード
    btnSave.disabled = true;
    const origText = btnSave.textContent;
    btnSave.textContent = "送信中...";
    try {
      await uploadCurrentOnly();
      markClean();
      setConnectionStatus(true);
      showToast(scope + "を保存しました（サーバーへ送信完了）");
    } catch (e) {
      console.warn("サーバー送信失敗:", e);
      markClean();
      setConnectionStatus(false);
      showToast(
        "端末に" + scope + "を保存しました。サーバー送信失敗：" + (e.message || 'ネットワークエラー') + "（後で同期してください）",
        "warn"
      );
    } finally {
      btnSave.textContent = origText;
      btnSave.disabled = false;
    }
  });

  document.getElementById("btnCopy").addEventListener("click", () => {
    if (currentMain === "weekly") {
      copyFromPrevDay();
    }
  });
  document.getElementById("btnClear").addEventListener("click", () => {
    if (currentMain === "weekly") {
      clearCurrentSection();
    } else {
      clearCurrentAnnual();
    }
  });
  document.getElementById("btnExcel").addEventListener("click", exportExcel);
  document.getElementById("btnYearExcel").addEventListener("click", exportYearExcel);

  // ページ離脱警告
  window.addEventListener("beforeunload", (e) => {
    if (isDirty) { e.preventDefault(); e.returnValue = ""; }
  });
}

function clearCurrentAnnual() {
  if (currentAnnualSub === "aeration") {
    if (!confirm("当月のエアレーション運転時間データをすべてクリアしますか？")) return;
    const ym = yoshiwaData.targetMonth;
    if (!ym) return;
    ensureAerationForMonth(ym);
    annualData.aeration[ym].days = {};
    renderAll();
  } else {
    if (!confirm("現在の項目をクリアしますか？")) return;
    // MLSS: 現在の日をクリア
    const ym = yoshiwaData.targetMonth;
    if (!ym) return;
    ensureMlssReturnForMonth(ym);
    const rec = annualData.mlssReturn[ym].weeks[currentMlssWeek][currentMlssDay];
    YOSHIWA_ANNUAL.mlss_return.fields.forEach(f => { rec[f.id] = null; });
    renderAll();
  }
  markDirty();
  showToast("クリアしました");
}

// ===== 初期化 =====
async function init() {
  // 強制更新後に付与されたクエリパラメータを掃除
  if (window.location.search.includes('_refresh=')) {
    const url = new URL(window.location.href);
    url.searchParams.delete('_refresh');
    window.history.replaceState({}, '', url.toString());
  }

  bindLoginEvents();
  updateUserInfoUI();

  // トークンが無い or 期限切れならログイン画面を表示、以降は bindLoginEvents 経由で continueInit が呼ばれる
  if (!isTokenValid()) {
    showLoginScreen();
    return;
  }
  await continueInit();
}

async function continueInit() {
  hideLoginScreen();
  updateUserInfoUI();

  const storedMonth = localStorage.getItem("yoshiwa_current_month") || currentYearMonth();
  yoshiwaData.targetMonth = storedMonth;
  document.getElementById("targetMonth").value = storedMonth;

  loadFromStorage();
  loadAnnualFromStorage();

  if (!yoshiwaData.startDate) {
    yoshiwaData.startDate = estimateStartDate(storedMonth);
  }
  document.getElementById("startDate").value = yoshiwaData.startDate || "";

  // カレンダー週構造を初回計算
  recomputeMonthWeeks();
  if (currentWeek > monthWeeks.length) currentWeek = 1;
  const ws0 = monthWeeks[currentWeek - 1];
  if (ws0 && !ws0[currentDay]) {
    for (let d = 1; d <= 5; d++) if (ws0[d]) { currentDay = d; break; }
  }

  // bindEvents は一度だけ呼ぶ
  if (!window.__mainEventsBound) {
    window.__mainEventsBound = true;
    bindEvents();
  }
  renderAll();

  // 接続状態を起動時にチェック & 2分おきに定期確認
  checkConnection();
  if (!window.__connCheckTimer) {
    window.__connCheckTimer = setInterval(checkConnection, 2 * 60 * 1000);
  }
}

init();
</script>
